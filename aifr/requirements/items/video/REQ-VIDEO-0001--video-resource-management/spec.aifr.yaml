  risk:
    level: high
    reasons:
      - cloudPublishStatus 同时影响老师素材库、班级群分享和学生播放，必须避免再次混淆为本地人工确认状态。
      - 视频文件只存储在云端，本地只保存元数据和状态镜像；实现和文案必须避免暗示本地存储视频文件。
      - 云端同步会批量写入外部云空间媒资信息，需要幂等、状态同步和非管理员访问限制。
      - 老师可分享自己的 TEACHER 视频和 SYSTEM 公共素材后，必须保证分享权限、学生播放授权和视频管理权限分离，避免猜 ID 分享或误下架公共云端素材。
      - 停用播放必须真正调用火山云 Unpublished，否则历史班级群入口无法可靠失效。
      - 禁用腾讯云入口但保留 legacy 代码，需要防止新配置或新视频操作继续走到腾讯云路径。

  non_functional:
    security:
      - 云端同步只允许 ADMIN 执行。
      - 老师分享权限不得授予删除、云端同步、云端下架或修改 SYSTEM 公共素材的权限。
      - 老师不得通过猜 ID 分享其他老师的 TEACHER 视频。
      - 班级群视频入口只应对当前班级学生成员生效，学生离班后不得继续使用该班入口播放。
      - 学生响应不得暴露存储配置、密钥或云端管理字段。
    reliability:
      - 云端同步必须按 cloud_media_id 幂等处理重复媒资。
      - 云端媒资缺少播放域名或播放地址时，本地视频应保持 PROCESSING 或 FAILED，并不可预览、不可分享、不可播放。
      - 系统内云端发布和云端下架操作成功后必须立即刷新本地 cloudPublishStatus 镜像。
      - 外部云控制台变更不保证实时感知，必须通过显式同步收敛。
      - 云端媒资不存在时不得自动删除本地记录，必须标记失败并清空播放地址。
    auditability:
      - 本阶段至少保留 createdBy、ownerUserId、publishedAt、unpublishedAt 和 updatedAt，用于追踪本系统观察到的云端发布状态变化。
      - publishedAt 和 unpublishedAt 表示本系统观察到状态变化的时间，不声明为云厂商真实操作时间。
    performance:
      - 云端同步应分页拉取云端媒资列表，单页大小不超过 100。
      - 列表、筛选、班级群可分享候选和学生播放默认使用本地 cloudPublishStatus 状态镜像，不在每次学生播放时实时查询云端。
