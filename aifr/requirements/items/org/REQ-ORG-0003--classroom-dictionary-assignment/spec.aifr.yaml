aifr_spec:
  schema_version: "1.0.0"
  id: REQ-ORG-0003
  version: "1.1.0"
  title: 班级辞书分配与可见性
  type: functional
  status: draft
  priority: high

  identity:
    primary_domain: ORG
    domain_path: org
    frozen_slug: classroom-dictionary-assignment
    canonical_path: aifr/requirements/items/org/REQ-ORG-0003--classroom-dictionary-assignment/spec.aifr.yaml
    naming_standard_version: "1.0.0"
    related_domains:
      - DICT
      - STUDY
      - MEM

  lifecycle:
    created_at: "2026-06-24"
    updated_at: "2026-06-26"
    owner: backend
    reviewers:
      - backend
      - qa

  versioning:
    change_type: minor
    previous_version: "1.0.0"
    supersedes:
      - REQ-ORG-0003@1.0.0
    superseded_by: null
    breaking_change: false
    change_summary: 明确移除班级辞书只影响当前可见性，不回写已发布学习计划或既有学习历史。

  revision_history:
    - version: "1.0.0"
      change_type: initial
      summary: 初始代码基线。
    - version: "1.1.0"
      change_type: minor
      summary: 新增班级辞书移除后的当前权限与历史保留边界。

  intent:
    user_goal: 管理员和教师可以把辞书分配给班级，学生通过班级获得可学习辞书。
    business_value: 降低逐个学生分配辞书的成本，并保证学习计划只能选择所有目标班级共有的辞书。

  scope:
    in:
      - 查询班级已分配辞书
      - 给班级批量分配辞书
      - 从班级移除辞书
      - 从辞书侧批量分配到班级
      - 按学生所在班级推导可见辞书
      - 按教师所管班级推导可见辞书
      - 多班级辞书交集查询
      - 移除班级辞书后的当前权限与历史保留边界
    out:
      - 班级辞书分配审批
      - 分配到期时间
      - 班级辞书排序配置
      - 班级内学生差异化可见性

  actors:
    primary:
      - admin
      - teacher
    secondary:
      - student
      - dictionary_service
      - student_word_memory_service
      - study_plan_service

  domain_terms:
    classroom_dictionary_assignment: 班级与辞书之间的分配关系，记录 classroomId、dictionaryId、assignedByUserId 和 assignedAt。
    assignable_dictionary: 管理员可分配任意辞书；教师只能把系统辞书、自己拥有或自己创建的辞书分配给自己管理的班级。
    classroom_dictionary_intersection: 多个班级共同分配的辞书集合。
    classroom_visible_dictionary: 因学生所在班级或教师管理班级而对用户可见的辞书。
    direct_dictionary_assignment: 辞书直接分配给学生的关系，不属于本需求的写入范围但会与班级分配合并为学生可见辞书。
    current_dictionary_visibility: 基于当前系统辞书、直接分配和班级分配关系计算出的辞书可见性。
    historical_study_artifact: 已发布学习计划、学生学习记录、学习进度和已形成的学生单词记忆等历史学习结果。

  preconditions:
    - 调用者已认证。
    - 分配或移除班级辞书的调用者必须是 ADMIN 或 TEACHER。
    - 目标 classroomId 必须存在。
    - 目标 dictionaryId 必须存在。

  rules:
    - id: RULE-001
      description: 管理员可管理任意班级辞书分配，教师只能管理自己 teacherId 下班级的辞书分配。
      invariant: manage_classroom_dictionary_allowed iff actor.role = ADMIN or (actor.role = TEACHER and classroom.teacher_id = actor.id)

    - id: RULE-002
      description: 教师分配辞书到班级时，辞书必须是系统辞书、教师拥有的辞书或教师创建的辞书。
      invariant: teacher_assign_dictionary_allowed iff dictionary.scope = SYSTEM or dictionary.owner_user_id = actor.id or dictionary.created_by = actor.id

    - id: RULE-003
      description: 班级辞书分配是幂等操作，同一 classroomId 和 dictionaryId 只能存在一条关系。
      invariant: unique(classroom_dictionary_assignment.classroom_id, classroom_dictionary_assignment.dictionary_id)

    - id: RULE-004
      description: 给班级批量分配辞书时，必须去重 dictionaryIds，忽略 null 值，并返回本次新增分配数。
      formula: assigned_count = count(new distinct non_null dictionary_ids)

    - id: RULE-005
      description: 从辞书侧批量分配到班级时，必须逐个复用班级侧分配权限和幂等规则。
      invariant: assign_dictionary_to_classrooms delegates each classroom to assign_dictionaries_to_classroom

    - id: RULE-006
      description: 学生可见辞书包含系统辞书、直接分配辞书和其所在班级分配的辞书。
      formula: student_visible_dictionaries = system_dictionaries union direct_assignments union classroom_assignments_for_student

    - id: RULE-007
      description: 教师可见辞书包含系统辞书、自己拥有或创建的辞书、以及自己管理班级已分配的辞书。
      formula: teacher_visible_dictionaries = system_dictionaries union owned_dictionaries union created_dictionaries union classroom_assignments_for_teacher

    - id: RULE-008
      description: 按多个班级过滤辞书时，只返回所有目标班级共同分配且调用者本身可见的辞书。
      formula: visible_for_classrooms = actor_visible_dictionaries intersect classroom_dictionary_intersection

    - id: RULE-009
      description: 学生不得按 classroomIds 参数过滤辞书。
      invariant: dictionary_filter_by_classroom_allowed requires actor.role in [ADMIN, TEACHER]

    - id: RULE-010
      description: 从班级移除辞书后，该辞书不再通过该班级贡献当前辞书可见性。
      invariant: removed_classroom_dictionary_assignment not_in current_dictionary_visibility for classroom_members

    - id: RULE-011
      description: 从班级移除辞书不得删除或改写已发布学习计划、学习记录、学习进度或既有学生单词记忆。
      invariant: removing_classroom_dictionary_assignment does_not_delete historical_study_artifact

  scenarios:
    - id: SCN-001
      name: 教师给自己的班级分配系统辞书
      given:
        - actor.role = TEACHER
        - actor.id = 7
        - classroom.teacherId = 7
        - dictionary.scopeType = SYSTEM
      when:
        - 调用 POST /api/classrooms/{id}/dictionaries
      then:
        - 创建 ClassroomDictionaryAssignment
        - assignedByUserId = 7
        - 返回 assignedCount = 1

    - id: SCN-002
      name: 教师不能给他人班级分配辞书
      given:
        - actor.role = TEACHER
        - actor.id = 7
        - classroom.teacherId = 8
      when:
        - 调用 POST /api/classrooms/{id}/dictionaries
      then:
        - 拒绝访问
        - 不创建分配记录

    - id: SCN-003
      name: 教师不能分配无权使用的教师私有辞书
      given:
        - actor.role = TEACHER
        - actor.id = 7
        - classroom.teacherId = 7
        - dictionary.scopeType = TEACHER
        - dictionary.ownerUserId = 8
        - dictionary.createdBy = 8
      when:
        - 调用 POST /api/classrooms/{id}/dictionaries
      then:
        - 拒绝访问
        - 不创建分配记录

    - id: SCN-004
      name: 学生通过班级获得辞书可见性
      given:
        - studentId = 20 是 classroomId = 100 的成员
        - classroomId = 100 已分配 dictionaryId = 10
      when:
        - 学生调用 GET /api/dictionaries 或收藏 dictionaryId = 10 中的单词
      then:
        - dictionaryId = 10 被视为学生可见辞书

    - id: SCN-005
      name: 多班级过滤只返回交集辞书
      given:
        - classroomId = 100 已分配 dictionaryId = 10 和 11
        - classroomId = 101 已分配 dictionaryId = 10
      when:
        - 教师调用 GET /api/dictionaries?classroomIds=100&classroomIds=101
      then:
        - 只返回 dictionaryId = 10

    - id: SCN-006
      name: 移除班级辞书后不再作为当前班级可见辞书
      given:
        - studentId = 20 是 classroomId = 100 的成员
        - classroomId = 100 已分配 dictionaryId = 10
      when:
        - 老师从 classroomId = 100 移除 dictionaryId = 10
      then:
        - dictionaryId = 10 不再因 classroomId = 100 对 studentId = 20 可见
        - 后续创建学习计划时，dictionaryId = 10 不再属于 classroomId = 100 的班级辞书交集

    - id: SCN-007
      name: 移除班级辞书不删除既有学习历史
      given:
        - classroomId = 100 曾分配 dictionaryId = 10
        - dictionaryId = 10 已用于已发布学习计划 studyPlan.id = 55
        - studentId = 20 已在 studyPlan.id = 55 下产生学习记录和学习进度
      when:
        - 老师从 classroomId = 100 移除 dictionaryId = 10
      then:
        - studyPlan.id = 55 不被删除
        - studentId = 20 的学习记录和学习进度不被删除
        - 既有学生单词记忆不被删除

  acceptance_criteria:
    - id: AC-001
      text: 班级辞书查询、分配和移除必须执行班级管理权限校验。
      verifies:
        - RULE-001

    - id: AC-002
      text: 教师分配辞书到班级时必须校验辞书归属或系统范围。
      verifies:
        - RULE-002

    - id: AC-003
      text: 重复分配同一辞书到同一班级不得重复计数或重复写入。
      verifies:
        - RULE-003
        - RULE-004

    - id: AC-004
      text: 从辞书侧分配到多个班级必须复用班级侧分配规则。
      verifies:
        - RULE-005

    - id: AC-005
      text: 教师和学生的辞书可见性必须包含由班级辞书分配推导出的辞书。
      verifies:
        - RULE-006
        - RULE-007

    - id: AC-006
      text: 多班级辞书过滤必须返回班级分配交集，且学生调用必须被拒绝。
      verifies:
        - RULE-008
        - RULE-009

    - id: AC-007
      text: 移除班级辞书后，该辞书不得继续通过该班级授予学生或教师当前可见性。
      verifies:
        - RULE-010

    - id: AC-008
      text: 移除班级辞书不得删除或改写已发布学习计划、学习记录、学习进度或既有学生单词记忆。
      verifies:
        - RULE-011

  interfaces:
    apis:
      - method: GET
        path: /api/classrooms/{id}/dictionaries
        request_schema: none
        response_schema: List<Dictionary>
      - method: POST
        path: /api/classrooms/{id}/dictionaries
        request_schema: AssignDictionariesRequest
        response_schema: message,classroomId,assignedCount
      - method: DELETE
        path: /api/classrooms/{id}/dictionaries/{dictionaryId}
        request_schema: none
        response_schema: none
      - method: POST
        path: /api/dictionaries/{id}/assign/classrooms
        request_schema: AssignClassroomsRequest
        response_schema: message,dictionaryId,assignedCount
      - method: GET
        path: /api/dictionaries
        request_schema: classroomIds?
        response_schema: List<Dictionary>
    persistence:
      - table: classroom_dictionary_assignments
        constraints: unique(classroom_id, dictionary_id), classroom_id references classrooms(id) on delete cascade, dictionary_id references dictionaries(id) on delete cascade
      - table: classroom_members
        usage: 按学生所在班级推导班级辞书可见性

  trace:
    expected_code:
      - controller: ClassroomController
      - controller: DictionaryController
      - service: ClassroomDictionaryAssignmentService
      - service: DictionaryService
      - service: AccessControlService
      - service: StudentWordMemoryService
      - repository: ClassroomDictionaryAssignmentRepository
      - migration: V20__create_classroom_dictionary_assignments.sql
    expected_tests:
      - ClassroomDictionaryAssignmentServiceTest
      - DictionaryServiceTest
      - StudentWordMemoryServiceTest
      - StudyPlanServiceTest
      - ClassroomDictionaryAssignmentServiceTest#removeDictionaryShouldNotDeleteHistoricalStudyArtifacts
      - DictionaryServiceTest#removedClassroomDictionaryShouldNotRemainVisibleThroughClassroom

  risk:
    level: high
    reasons:
      - 班级辞书分配直接影响学生可学习内容和教师可见资源。
      - 多班级交集规则被学习计划创建复用，错误会导致计划选择不可用辞书。

  non_functional:
    security:
      - 教师不得给非自己班级分配辞书。
      - 教师不得分配其他教师私有辞书。
      - 学生不得使用 classroomIds 过滤辞书。
    reliability:
      - 分配写入必须在事务内完成。
      - 唯一约束和服务层幂等必须共同避免重复分配。
      - 移除班级辞书只改变当前可见性，不得回写历史学习结果。
    performance:
      - 多班级交集计算应在班级 ID 去重后进行，避免重复扫描。

  open_questions:
    - 班级辞书返回排序目前按名称忽略大小写排序，是否需要产品层固定排序策略。
