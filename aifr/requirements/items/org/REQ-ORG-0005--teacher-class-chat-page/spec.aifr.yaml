  risk:
    level: medium
    reasons:
      - 页面横跨班级权限、消息流、已发布学习计划和视频资源分享。
      - 学习计划分享必须严格复用既有学习计划发布和班级范围规则，避免聊天入口绕过学习计划权限。
      - 会话列表排序和轮询刷新会引入新的班级消息聚合查询。
      - 聊天式布局对桌面和窄屏响应式体验要求较高。

  non_functional:
    performance:
      - 初次进入页面时，班级会话列表和首屏消息应能分页加载，避免一次性拉取所有历史消息。
      - 30 秒轮询刷新不得重复拉取非当前班级的完整消息历史。
      - 消息流分页加载和轮询刷新时不得造成输入区明显卡顿。
    reliability:
      - 发布请求失败时必须可重试，且不得重复创建已成功提交的消息。
      - 页面刷新后必须能从服务端状态恢复已发布消息。
      - 轮询请求失败时不得清空当前已展示消息，应保留页面可读状态并提示刷新失败。
    security:
      - 所有消息查询和发布接口必须执行当前用户、班级和资源权限校验。
      - 学习计划分享不得绕过学习计划已发布状态、教师归属和班级范围校验。
      - 视频资源卡片不得暴露未授权播放地址。
    usability:
      - 页面视觉结构应接近主流会话工具，消息阅读、切班、发布三类操作必须可快速触达。
      - 教师分享学习计划或视频资源前必须能确认发布目标班级。
      - 无可管理班级时必须展示空状态，并提示教师创建班级或联系管理员。

  open_questions:
    - 管理员是否可以代入教师身份查看或发送班级聊天消息，需要与后台权限策略统一。
    - 学习计划分享卡片点击后，教师端和学生端分别跳转到哪个具体页面或路由。
    - 会话列表的最后消息摘要是否需要对学习计划和视频卡片使用固定模板文案。
