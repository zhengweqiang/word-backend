      - StudyPlanServiceTest#currentClassroomStatisticsShouldExcludeTransferredOutStudent

  risk:
    level: critical
    reasons:
      - 该约束决定学习计划覆盖哪些学生和辞书，错误会导致跨班级、跨教师或不可见辞书的学习任务。
      - 发布流程会写入学生计划和辞书分配，涉及多表一致性。

  non_functional:
    security:
      - 教师不得借学习计划选择其他教师班级。
      - 发布前必须逐学生执行辞书分配权限校验。
    reliability:
      - 创建计划和保存班级关联必须在事务中完成。
      - 发布计划时目标学生应按班级成员去重，避免重复创建学生计划。
      - 班级成员变更不得隐式改写已发布学习计划的学生快照。
      - 班级辞书分配变化不得回写已发布学习计划历史。
      - 班级负责老师变更不得批量改写已发布学习计划归属或历史统计归属。
      - 学生离班不得删除或阻断其已分配个人学习计划。
      - 计划历史报表和当前班级统计必须使用不同成员口径，避免历史断裂或当前数据污染。
    performance:
      - 班级 ID 和学生 ID 应去重后处理，避免重复写入和重复权限校验。

  open_questions: []
